<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>
    <!-- Button trigger modal -->
    <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#exampleModal">
        Launch demo modal
    </button>

    <!-- Modal -->
    <div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-5" id="exampleModalLabel">Modal title</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    ...
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-primary">Save changes</button>
                </div>
            </div>
        </div>
    </div>

    <br>

    <!-- Button trigger modal -->
    <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#staticBackdrop">
        Launch static backdrop modal
    </button>

    <!-- Modal -->
    <div class="modal fade" id="staticBackdrop" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1"
        aria-labelledby="staticBackdropLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-5" id="staticBackdropLabel">Modal title</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    ...
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-primary">Understood</button>
                </div>
            </div>
        </div>
    </div>
    <br>
    <!-- Scrollable modal -->
    <div class="modal-dialog modal-dialog-scrollable">
        mathard
    </div>

    <br>

    <!-- Vertically centered modal -->
    <div class="modal-dialog modal-dialog-centered">
        Up
    </div>

    <!-- Vertically centered scrollable modal -->
    <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
        Down
    </div>

    <br>

    <div class="modal-body">
        <h2 class="fs-5">Popover in a modal</h2>
        <p>This <button class="btn btn-primary" data-bs-toggle="popover" title="Popover title"
                data-bs-content="Popover body content is set in this attribute.">button</button> triggers a popover on
            click.</p>
        <hr>
        <h2 class="fs-5">Tooltips in a modal</h2>
        <p><a href="https://www.bing.com/images/search?q=image&id=D9C67B50F4CEF5EC53FB3EFC75E2C5933423C302&form=IQFRBA&first=1&disoverlay=1"
                data-bs-toggle="tooltip" title="Tooltip">This link</a> and <a href="#" data-bs-toggle="tooltip"
                title="Tooltip">that link</a> have tooltips on hover.</p>
    </div>
    <div class="modal-body">
        <div class="container-fluid">
            <div class="row">
                <div class="col-md-4">shivnar</div>
                <div class="col-md-4 ms-auto">mor</div>
            </div>
            <div class="col-">
                <div class="col-md-3 ms-auto">patna</div>
                <div class="col-md-2 ms-auto">bihar</div>
            </div>
            <div class="row">
                <div class="col-md-6 ms-auto">mokama</div>
            </div>
            <div class="row">
                <div class="col-sm-9">
                    Gaya
                    <div class="row">
                        <div class="col-8 col-sm-6">
                            jahanabad
                        </div>
                        <div class="col-4 col-sm-6">
                            delhi
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
