<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bootstrap demo</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <h1>Registration form !</h1>

    <div class="btn-primary">
      <form action="">

        <label for="" class="form-label">Name</label>
        
        <input type="text" name="name" id="" class="form-control" placeholder="your name" />

        <label for="" class="form-label">Email</label>
        <input type="email" name="email" id="" class="form-control" placeholder="your @email.com "/>

        <label for="">Mobile Number</label>
        <input type="number" name="mobile" id="" class="form-control" placeholder="your number"/>

        <label for="" class="form-label">D.O.B</label>
        <input type="date" name="dob" id="" class="form-control" placeholder="dd/mm/yy"  />

        <label for="">Gender: </label>
        <br />

        <input type="radio" name="gender" />
        <label for="">Male</label>

        <input type="radio" name="gender" />
        <label for="">Female</label>

        <input type="radio" name="gender" />
        <label for="">non</label>

        <br />
        <label for="" class="form-label">Upload Your Document : </label>
        <input type="file" name="document" id="" class="form-control" />

        <center><button class="btn btn-primary">Submit</button></center>
      </form>
    </div>
  </body>
</html>
